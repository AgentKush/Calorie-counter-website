name: 🐛 Bug report
description: Something in Mycelia isn't working right
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve **Mycelia**! Fill in what you can so the problem can be reproduced and fixed."
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect to happen instead?
      placeholder: e.g. On my phone the macro rings spill off the right edge of the screen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device & browser
      placeholder: e.g. iPhone 13 / Safari  ·  or  Windows / Chrome
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown at the bottom of the app and in the 🗒 "What's new" dialog.
      placeholder: v1.13.0
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      options:
        - Not sure
        - Today / food log
        - Calculator / goals
        - Recipes / meal planner
        - Fasting
        - Trends / charts
        - Settings / data
        - Appearance / theme
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or anything else (optional)
      description: Drag images in here if it helps.
    validations:
      required: false
