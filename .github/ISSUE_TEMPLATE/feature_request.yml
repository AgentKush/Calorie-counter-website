name: 💡 Feature request
description: Suggest a new feature or an improvement
title: "[Idea]: "
labels: ["feature request", "needs triage"]
body:
  - type: markdown
    attributes:
      value: "Got an idea for **Mycelia**? I'd love to hear it."
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem would it solve?
      description: What are you trying to do that's hard, slow or missing today?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      options:
        - Not sure
        - Today / food log
        - Calculator / goals
        - Recipes / meal planner
        - Fasting
        - Trends / charts
        - Settings / data
        - Appearance / theme
    validations:
      required: false
